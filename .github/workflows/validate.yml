name: Validate Documentation

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]

jobs:
  validate-docs:
    runs-on: ubuntu-latest
    steps:
    - name: Checkout repository
      uses: actions/checkout@v4
    
    - name: Validate Markdown files
      run: |
        echo "Validating documentation files..."
        
        # Check if key files exist
        files=("README.md" "SKILL.md" "LICENSE" ".gitignore")
        for file in "${files[@]}"; do
          if [ ! -f "$file" ]; then
            echo "ERROR: Missing required file: $file"
            exit 1
          fi
        done
        
        # Check if documentation templates exist
        templates=("BOOTSTRAP.md.tpl" "SESSION-LOG.md.tpl" "SPRINTS.md.tpl" "README.md.tpl" "MVP.md.tpl" "DOCSTRING_STANDARD.md.tpl" "DESIGN_SYSTEM.md.tpl" "VOICE_GUIDE.md.tpl")
        for template in "${templates[@]}"; do
          if [ ! -f "references/$template" ]; then
            echo "ERROR: Missing template file: references/$template"
            exit 1
          fi
        done

        # Sanity-check the docstring standard mentions both required style conventions
        if ! grep -qi "google" references/DOCSTRING_STANDARD.md.tpl; then
          echo "ERROR: DOCSTRING_STANDARD.md.tpl must mention Google-style docstrings (Python)"
          exit 1
        fi
        if ! grep -qi "tsdoc\|jsdoc" references/DOCSTRING_STANDARD.md.tpl; then
          echo "ERROR: DOCSTRING_STANDARD.md.tpl must mention TSDoc/JSDoc (TypeScript)"
          exit 1
        fi
        if ! grep -qi "fail-under\|coverage" references/DOCSTRING_STANDARD.md.tpl; then
          echo "ERROR: DOCSTRING_STANDARD.md.tpl must define a coverage threshold (e.g. interrogate --fail-under=80)"
          exit 1
        fi

        # Sanity-check the design system standard covers tokens and bans the obvious AI-slop patterns
        if ! grep -qi "token" references/DESIGN_SYSTEM.md.tpl; then
          echo "ERROR: DESIGN_SYSTEM.md.tpl must define a token system"
          exit 1
        fi
        if ! grep -qi "phosphor" references/DESIGN_SYSTEM.md.tpl; then
          echo "ERROR: DESIGN_SYSTEM.md.tpl must lock in the Phosphor icon set"
          exit 1
        fi
        if ! grep -qi "backdrop-filter\|glassmorphism" references/DESIGN_SYSTEM.md.tpl; then
          echo "ERROR: DESIGN_SYSTEM.md.tpl must ban glassmorphism / backdrop-filter"
          exit 1
        fi
        if ! grep -qi "linear-gradient\|gradient" references/DESIGN_SYSTEM.md.tpl; then
          echo "ERROR: DESIGN_SYSTEM.md.tpl must ban decorative gradients"
          exit 1
        fi

        # Sanity-check the voice guide has a banned-phrase list and the em-dash ban
        if ! grep -qi "banned" references/VOICE_GUIDE.md.tpl; then
          echo "ERROR: VOICE_GUIDE.md.tpl must define a banned-phrase list"
          exit 1
        fi
        if ! grep -qi "vale" references/VOICE_GUIDE.md.tpl; then
          echo "ERROR: VOICE_GUIDE.md.tpl must reference Vale enforcement"
          exit 1
        fi
        if ! grep -qE "leverage|robust|seamless" references/VOICE_GUIDE.md.tpl; then
          echo "ERROR: VOICE_GUIDE.md.tpl must include the canonical AI-slop phrases (leverage, robust, seamless)"
          exit 1
        fi
        if ! grep -qE "—|em-dash|em dash" references/VOICE_GUIDE.md.tpl; then
          echo "ERROR: VOICE_GUIDE.md.tpl must ban the em-dash in body copy"
          exit 1
        fi
        
        # Validate README.md length
        readme_lines=$(wc -l < README.md)
        if [ $readme_lines -lt 500 ]; then
          echo "WARNING: README.md is only $readme_lines lines. Consider making it more detailed."
        fi
        
        # Check SKILL.md for required sections
        if ! grep -q "Phase 0: Project Type Detection" SKILL.md; then
          echo "ERROR: SKILL.md missing Phase 0: Project Type Detection"
          exit 1
        fi
        
        if ! grep -q "Brownfield" SKILL.md; then
          echo "ERROR: SKILL.md missing brownfield support"
          exit 1
        fi
        
        echo "✅ All documentation validation checks passed!"
    
    - name: Generate documentation stats
      run: |
        echo "📊 Documentation Statistics:"
        echo "==========================="
        echo "Total files: $(find . -name "*.md" -o -name "*.tpl" | wc -l)"
        echo "Total lines: $(find . -name "*.md" -o -name "*.tpl" -exec cat {} + | wc -l)"
        echo "Templates: $(find references -name "*.tpl" | wc -l)"
        echo "Documentation sections in SKILL.md: $(grep -c "^###" SKILL.md)"
        echo ""
        echo "📁 File sizes:"
        ls -lh README.md SKILL.md
        echo ""
        echo "📝 Template files:"
        ls -lh references/
    
    - name: Create documentation summary
      run: |
        echo "# 📋 Documentation Summary" > docs-summary.md
        echo "" >> docs-summary.md
        echo "## 🎯 Overview" >> docs-summary.md
        echo "- **Total Files**: $(find . -name "*.md" -o -name "*.tpl" | wc -l)" >> docs-summary.md
        echo "- **Total Lines**: $(find . -name "*.md" -o -name "*.tpl" -exec cat {} + | wc -l)" >> docs-summary.md
        echo "- **Templates**: $(find references -name "*.tpl" | wc -l)" >> docs-summary.md
        echo "" >> docs-summary.md
        echo "## 📄 Key Files" >> docs-summary.md
        echo "- README.md: $(wc -l < README.md) lines" >> docs-summary.md
        echo "- SKILL.md: $(wc -l < SKILL.md) lines" >> docs-summary.md
        echo "- LICENSE: $(wc -l < LICENSE) lines" >> docs-summary.md
        echo "" >> docs-summary.md
        echo "## 📚 Documentation Templates" >> docs-summary.md
        for template in references/*.tpl; do
          if [ -f "$template" ]; then
            echo "- $(basename $template): $(wc -l < $template) lines" >> docs-summary.md
          fi
        done
        echo "" >> docs-summary.md
        echo "Generated on: $(date)" >> docs-summary.md
    
    - name: Upload documentation summary
      uses: actions/upload-artifact@v4
      with:
        name: documentation-summary
        path: docs-summary.md